# workspace-manifest.yaml
# Generated by: team-lib/_admin/bootstrap_local.sh
# Location: ~/.ai-workspace-manifest.yaml (user's home directory)
# Purpose: Single source of truth for workspace paths across all machines
# Note: This is a TEMPLATE. The bootstrap script generates actual paths per machine.

version: "1.1"
generated_at: "2026-01-15T00:00:00Z"
workspace_layout: "multi-root"

# These will be populated by bootstrap_local.sh on each machine
workspace_root: /home/USERNAME/ai-workspace

roots:
  personal:
    path: /home/USERNAME/ai-workspace/personal
    role: user-local
    description: "Private human workspace - notes, secrets, preferences"
    is_git_repo: false
    is_gitignored: true
    key_subdirs:
      notes: notes/
      scratch: scratch/
      preferences: preferences/
      secrets: secrets/

  team_lib:
    path: /home/USERNAME/ai-workspace/team-lib
    role: shared-sop
    description: "Shared team library - SOPs, directives, templates"
    is_git_repo: true
    github_repo: Pvragon/pvragon-ai-library
    is_gitignored: false
    key_subdirs:
      registry: registry/
      directives: directives/
      skills: skills/
      personas: personas/
      context_source: context/
      executions: executions/
      harnesses: harnesses/
      admin: _admin/

  my_lib:
    path: /home/USERNAME/ai-workspace/my-lib
    role: user-directives
    description: "Personal overlay library - user directives & scripts"
    is_git_repo: true
    github_repo: your-username/private-ai-library
    is_gitignored: false
    key_subdirs:
      archive: archive/
      backlog: backlog/
      config: config/
      registry: registry/
      directives: directives/
      skills: skills/
      personas: personas/
      context_source: context/
      executions: executions/
      harnesses: harnesses/
      runtime: runtime/

  projects:
    path: /home/USERNAME/ai-workspace/projects
    role: active-repos
    description: "Active development - all project repositories"
    is_git_repo: false
    contains_git_repos: true
    key_subdirs: {}

# Context Assembly Order (load priority for agents)
context_layers:
  - team_lib
  - my_lib
  - personal

# Standard project structure (used in projects/ subfolders)
project_structure:
  src: "Source code"
  docs: "Documentation"
  docs/specs: "Requirements and definition of done"
  docs/context: "Project context for agents"
  docs/directives: "Project-specific rules and workflows"
  README.md: "Project overview"
