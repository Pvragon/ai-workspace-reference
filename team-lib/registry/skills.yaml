# summary: Team skills registry. Lists available shared skills with paths, capabilities, and dependencies.
# Skills Registry (pvragon team)
# ------------------------------------------
# This manifest catalogs available team agent skills.
#
# Schema:
#   skills:
#     - name: <string>           # Unique identifier
#       description: <string>    # Brief description
#       path: <string>           # Relative path to skill definition
#       capabilities: [<string>, ...]  # What this skill enables
#       dependencies: [<string>, ...]  # Required skills or tools
#       version: <string>        # Semantic version
#       source: <string>         # "internal" (default, omitted) or "external"
#       provider: <string>       # For external skills: origin repo/author
#       status: <string>         # "active" (default, omitted) or "deprecated"
#
# Search hierarchy (Operating Principle #1):
#   1. Internal skills (source: internal / no source field)
#   2. External skills (source: external)
#   When multiple skills match a query, prefer internal over external.
#
# ------------------------------------------

skills:

  # ============================================================
  # INTERNAL SKILLS (preferred in search hierarchy)
  # ============================================================

  - name: create-directive
    description: Guidelines for creating effective workflow directives that orchestrate without redundancy
    path: skills/create-directive/SKILL.md
    capabilities: [directive-design, workflow-orchestration, best-practices]
    dependencies: []
    tags: [directive, documentation, workflow, templates, best-practices]
    version: "1.1.0"

  - name: generate-release-notes
    description: Automate team release notes by analyzing git history and changelogs.
    path: skills/_workspace-developer/generate-release-notes/SKILL.md
    capabilities: [git-analysis, changelog-generation, smart-history]
    dependencies: [git, python3]
    tags: [release, changelog, git, documentation, automation]
    version: "1.0.0"

  - name: markdown-to-branded-doc
    description: Convert markdown files to branded documents — .docx files or Google Docs via gws CLI
    path: skills/markdown-to-branded-doc/SKILL.md
    capabilities: [markdown-conversion, docx-generation, gdoc-generation, branding, document-formatting]
    dependencies: [node, npm, marked, docx, gws, poppler-utils]
    tags: [docx, gdoc, conversion, branding, export, formatting, google-docs, gws-cli]
    version: "4.0.0"

  - name: compose-branded-template
    description: "Composes brand tokens with document type templates to produce fully resolved branded templates. Parses brand-guidelines.md into W3C-aligned brand-tokens.json, merges base+override templates, resolves all tokenRef dot-paths. Optionally creates Google Doc starter templates via clasp."
    path: skills/compose-branded-template/SKILL.md
    capabilities: [brand-composition, design-tokens, template-generation, document-types, starter-templates]
    dependencies: [node, "@google/clasp"]
    tags: [brand, tokens, templates, composition, w3c, documents, slides, presentations, clasp, apps-script]
    version: "2.1.0"

  - name: create-brand-guidelines
    description: "Create or update a brand-guidelines.md file for any brand. Ingests source materials, extracts tokens, validates coverage, walks user through gap-filling. Generates brand-tokens.json via parse-brand-guidelines.js."
    path: skills/create-brand-guidelines/SKILL.md
    capabilities: [branding, design-tokens, brand-guidelines, content-pipeline, brand-onboarding]
    dependencies: [node]
    tags: [brand, tokens, guidelines, onboarding, w3c, content-pipeline]
    version: "1.2.0"

  - name: skill-autoresearch
    description: "Meta-skill that stress-tests and improves other skills through an automated loop: executor agents follow the skill procedure, score confusion quantitatively, fix issues, repeat until convergence. Based on Karpathy's autoresearch pattern."
    path: skills/skill-autoresearch/SKILL.md
    capabilities: [skill-testing, quality-improvement, autoresearch, self-improvement]
    dependencies: []
    tags: [meta-skill, quality, testing, autoresearch, improvement-loop]
    version: "1.0.0"

  - name: scaffold-project-docs
    description: Bootstrap the standard docs/ structure for a new project in projects/
    path: skills/scaffold-project-docs/SKILL.md
    capabilities: [project-scaffolding, docs-structure, template-generation]
    dependencies: [python3]
    tags: [scaffolding, project-setup, docs, templates]
    version: "1.0.0"

  - name: send-pulse
    description: "Send an on-demand manual pulse to the ClickUp Pulse channel. Standardized format: JH Manual Pulse HH:MM PM: <concise summary>. Can also register thread-to-task mappings for automated activity posting."
    path: skills/send-pulse/SKILL.md
    capabilities: [messaging, clickup, pulse, task-registration]
    dependencies: []
    tags: [pulse, clickup, activity-tracking, manual-update]
    version: "2.1.0"

  - name: check-for-workspace-updates
    description: "Compares local workspace files (AGENTS.md, etc.) against team-lib canonical templates and guides upgrades."
    path: skills/check-for-workspace-updates/SKILL.md
    capabilities: [workspace-maintenance, template-comparison, upgrade-guidance]
