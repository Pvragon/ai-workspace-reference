    tags: [workspace, updates, templates, maintenance]
    version: "1.0.0"

  - name: update-drive-index
    description: "Refreshes the Google Drive index by enumerating all Shared Drives and root-level contents via the Google Drive API."
    path: skills/update-drive-index/SKILL.md
    capabilities: [google-drive, index-refresh, api-enumeration]
    dependencies: [google-drive-mcp]
    tags: [google-drive, index, automation]
    version: "1.1.0"

